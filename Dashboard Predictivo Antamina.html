document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7l-2-2H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2z\"><\u002Fpath><path d=\"M8 11h8\"><\u002Fpath><path d=\"M8 15h5\"><\u002Fpath><\u002Fsvg>\n                      <\u002Fa>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ r.noNews }}\" hint-placeholder-val=\"{{ false }}\">\n                      <span title=\"Sin eventos registrados\" style=\"display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);color:#56657a;\">\n                        <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg>\n                      <\u002Fspan>\n                    <\u002Fsc-if>\n                  <\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:20px;text-align:center;font-size:11.5px;color:#5f7388;\">PROTECTA PERÚ · Modelo de alerta temprana para ANTAMINA — Áncash · Predicción a 30 días por UGT (regresión logística, validación walk-forward). Prototipo demostrativo.<\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1500,&quot;height&quot;:1180}}\">\nclass Component extends DCLogic {\n  state = { focus:null, hover:null };\n\n  UGT(){\n    return [\n      {name:'Mina San Marcos', prob:65.1, freq:33, protesta:11, violencia:12},\n      {name:'Valle Fortaleza', prob:62.2, freq:16, protesta:7,  violencia:1},\n      {name:'Huarmey',         prob:61.2, freq:47, protesta:25, violencia:4},\n      {name:'Huallanca',       prob:34.9, freq:18, protesta:8,  violencia:3}\n    ];\n  }\n\n  ROWS(){\n    return [\n      ['Mina San Marcos','Huari','San Marcos',19,'07/04/2026',70],\n      ['Mina San Marcos','Huari','Chavín de Huántar',2,'21/02/2026',28],\n      ['Mina San Marcos','Huari','Huachis',1,'12/01/2026',14],\n      ['Mina San Marcos','Huari','San Pedro de Chana',1,'03/12/2025',10],\n      ['Huarmey','Huarmey','Huarmey',29,'05/03/2026',100],\n      ['Huarmey','Huarmey','Culebras',0,'—',0],\n      ['Huarmey','Huarmey','Cochapetí',0,'—',0],\n      ['Valle Fortaleza','Recuay','Pampas Chico',4,'13/03/2026',63],\n      ['Valle Fortaleza','Recuay','Catac',2,'18/02/2026',45],\n      ['Valle Fortaleza','Bolognesi','Cajacay',1,'22/01/2026',30],\n      ['Valle Fortaleza','Bolognesi','Colquioc',1,'09/12/2025',22],\n      ['Valle Fortaleza','Recuay','Marca',0,'—',0],\n      ['Huallanca','Bolognesi','Huallanca',6,'28/03/2026',58],\n      ['Huallanca','Bolognesi','Aquía',2,'15/02/2026',34],\n      ['Huallanca','Bolognesi','Chiquián',2,'30/01/2026',30],\n      ['Huallanca','Bolognesi','Pacllón',1,'11/12/2025',18],\n      ['Huallanca','Bolognesi','Huayllacayán',0,'—',0],\n      ['Huallanca','Bolognesi','Pararín',0,'—',0]\n    ];\n  }\n\n  level(p){\n    if(p>=55) return {level:'ALTO', color:'#ef4d5e', soft:'#ef4d5e'};\n    if(p>=35) return {level:'MEDIO', color:'#f5a623', soft:'#f5a623'};\n    return {level:'BAJO', color:'#2ec58f', soft:'#2ec58f'};\n  }\n\n  idxMeta(v){\n    if(v>=65) return {color:'#ef4d5e'};\n    if(v>=40) return {color:'#f5a623'};\n    if(v>=1)  return {color:'#4f9fd6'};\n    return {color:'#6b7d90'};\n  }\n\n  action(v){\n    if(v>=65) return {label:'Mesa de diálogo urgente', color:'#ef4d5e'};\n    if(v>=50) return {label:'Intervención preventiva', color:'#f5a623'};\n    if(v>=33) return {label:'Monitoreo reforzado', color:'#e8943a'};\n    return {label:'Vigilancia rutinaria', color:'#2ec58f'};\n  }\n\n  gauge(prob, mt){\n    const h=React.createElement;\n    const W=176,H=104,cx=88,cy=92,r=66,sw=13;\n    const pol=(a)=>[cx+r*Math.cos(a*Math.PI/180), cy+r*Math.sin(a*Math.PI/180)];\n    const arc=(a0,a1)=>{const p0=pol(a0),p1=pol(a1);const large=Math.abs(a1-a0)>180?1:0;const sweep=a1>a0?1:0;return 'M'+p0[0].toFixed(1)+' '+p0[1].toFixed(1)+' A'+r+' '+r+' 0 '+large+' '+sweep+' '+p1[0].toFixed(1)+' '+p1[1].toFixed(1);};\n    const f=Math.max(0,Math.min(100,prob))/100;\n    const endA=180+180*f;\n    const len=Math.PI*r;\n    const kids=[];\n    kids.push(h('path',{key:'tr',d:arc(180,360),fill:'none',stroke:'rgba(255,255,255,.10)',strokeWidth:sw,strokeLinecap:'round'}));\n    kids.push(h('path',{key:'val',d:arc(180,360),fill:'none',stroke:mt.color,strokeWidth:sw,strokeLinecap:'round',pathLength:1,strokeDasharray:1,strokeDashoffset:1-f,style:{transition:'stroke-dashoffset .9s cubic-bezier(.4,0,.2,1)'}}));\n    kids.push(h('text',{key:'v',x:cx,y:cy-12,textAnchor:'middle',fontSize:30,fontWeight:700,fill:'#fff',fontFamily:'Segoe UI, sans-serif'},prob.toFixed(1)+'%'));\n    kids.push(h('text',{key:'l',x:cx,y:cy+8,textAnchor:'middle',fontSize:10.5,fill:'#8497ab',letterSpacing:'.04em'},'prob. 30 días'));\n    return h('svg',{viewBox:'0 0 '+W+' '+H,width:'100%',style:{display:'block',maxWidth:'186px'}},kids);\n  }\n\n  buildModelChart(){\n    const h=React.createElement;\n    const W=520,H=128,L=170,R=58,top=14,gap=26,bh=34,axisMax=0.7;\n    const data=[{label:'Este modelo',val:0.593,color:'#2b7cc0',hl:true},{label:'Solo frecuencia histórica',val:0.361,color:'#7d8ea0',hl:false}];\n    const iW=W-L-R;\n    const kids=[];\n    [0,0.35,0.7].forEach(g=>{const x=L+iW*g/axisMax;kids.push(h('line',{key:'g'+g,x1:x,x2:x,y1:top-4,y2:top+gap+bh*2+gap,stroke:'rgba(255,255,255,.08)',strokeWidth:1}));kids.push(h('text',{key:'gt'+g,x:x,y:H-4,textAnchor:'middle',fontSize:9.5,fill:'#5f7388'},g.toFixed(2)));});\n    data.forEach((d,i)=>{\n      const y=top+i*(bh+gap);\n      const w=iW*d.val/axisMax;\n      kids.push(h('text',{key:'lb'+i,x:L-12,y:y+bh/2+1,textAnchor:'end',dominantBaseline:'middle',fontSize:11.5,fontWeight:d.hl?700:600,fill:d.hl?'#dce8f4':'#9fb0c2'},d.label));\n      kids.push(h('rect',{key:'bgr'+i,x:L,y:y,width:iW,height:bh,rx:7,fill:'rgba(255,255,255,.05)'}));\n      kids.push(h('rect',{key:'br'+i,x:L,y:y,width:w,height:bh,rx:7,fill:d.color,style:{transformOrigin:L+'px '+(y+bh/2)+'px',animation:'growW .9s cubic-bezier(.4,0,.2,1) both',animationDelay:(0.15+i*0.12)+'s'}}));\n      kids.push(h('text',{key:'vl'+i,x:L+w+10,y:y+bh/2+1,dominantBaseline:'middle',fontSize:14,fontWeight:700,fill:'#fff'},d.val.toFixed(3)));\n    });\n    return h('svg',{viewBox:'0 0 '+W+' '+H,width:'100%',style:{display:'block'}},kids);\n  }\n\n  buildFreqChart(){\n    const h=React.createElement;\n    const data=this.UGT().slice().sort((a,b)=>b.freq-a.freq);\n    const W=520,H=176,L=158,R=52,top=12,bh=26,gap=12;\n    const iW=W-L-R, max=50;\n    const kids=[];\n    [0,25,50].forEach(g=>{const x=L+iW*g/max;kids.push(h('line',{key:'g'+g,x1:x,x2:x,y1:top-4,y2:top+data.length*(bh+gap)-gap+4,stroke:'rgba(255,255,255,.08)',strokeWidth:1}));kids.push(h('text',{key:'gt'+g,x:x,y:H-3,textAnchor:'middle',fontSize:9.5,fill:'#5f7388'},g+'%'));});\n    data.forEach((d,i)=>{\n      const y=top+i*(bh+gap);\n      const w=iW*d.freq/max;\n      const foc=this.state.focus;\n      const dim=foc&&foc!==d.name;\n      kids.push(h('text',{key:'lb'+i,x:L-12,y:y+bh/2+1,textAnchor:'end',dominantBaseline:'middle',fontSize:11.5,fontWeight:dim?500:700,fill:dim?'#6f8294':'#cdd9e6'},d.name));\n      kids.push(h('rect',{key:'bgr'+i,x:L,y:y,width:iW,height:bh,rx:6,fill:'rgba(255,255,255,.05)'}));\n      kids.push(h('rect',{key:'br'+i,x:L,y:y,width:w,height:bh,rx:6,fill:'#2b7cc0',opacity:dim?0.4:1,style:{transformOrigin:L+'px '+(y+bh/2)+'px',animation:'growW .85s cubic-bezier(.4,0,.2,1) both',animationDelay:(0.1+i*0.08)+'s'}}));\n      kids.push(h('text',{key:'vl'+i,x:L+w+9,y:y+bh/2+1,dominantBaseline:'middle',fontSize:12.5,fontWeight:700,fill:dim?'#7f93a8':'#fff'},d.freq+'%'));\n    });\n    return h('svg',{viewBox:'0 0 '+W+' '+H,width:'100%',style:{display:'block'}},kids);\n  }\n\n  buildEventChart(){\n    const h=React.createElement;\n    const data=this.UGT().slice().sort((a,b)=>(b.protesta+b.violencia)-(a.protesta+a.violencia));\n    const W=420,H=190,L=128,R=40,top=12,bh=26,gap=14;\n    const iW=W-L-R, max=30;\n    const kids=[];\n    [0,10,20,30].forEach(g=>{const x=L+iW*g/max;kids.push(h('line',{key:'g'+g,x1:x,x2:x,y1:top-4,y2:top+data.length*(bh+gap)-gap+4,stroke:'rgba(255,255,255,.07)',strokeWidth:1}));kids.push(h('text',{key:'gt'+g,x:x,y:H-3,textAnchor:'middle',fontSize:9.5,fill:'#6b6051'},g));});\n    data.forEach((d,i)=>{\n      const y=top+i*(bh+gap);\n      const wp=iW*d.protesta/max, wv=iW*d.violencia/max;\n      const foc=this.state.focus, dim=foc&&foc!==d.name;\n      kids.push(h('text',{key:'lb'+i,x:L-11,y:y+bh/2+1,textAnchor:'end',dominantBaseline:'middle',fontSize:11,fontWeight:dim?500:700,fill:dim?'#7a6e58':'#e0d5c0'},d.name));\n      kids.push(h('rect',{key:'bg'+i,x:L,y:y,width:iW,height:bh,rx:6,fill:'rgba(255,255,255,.04)'}));\n      kids.push(h('rect',{key:'p'+i,x:L,y:y,width:wp,height:bh,rx:6,fill:'#e8943a',opacity:dim?0.4:1,style:{transformOrigin:L+'px '+(y+bh/2)+'px',animation:'growW .85s cubic-bezier(.4,0,.2,1) both',animationDelay:(0.1+i*0.07)+'s'}}));\n      kids.push(h('rect',{key:'v'+i,x:L+wp,y:y,width:wv,height:bh,fill:'#cf3a3a',opacity:dim?0.4:1,style:{transformOrigin:L+'px '+(y+bh/2)+'px',animation:'growW .85s cubic-bezier(.4,0,.2,1) both',animationDelay:(0.18+i*0.07)+'s'}}));\n      kids.push(h('text',{key:'t'+i,x:L+wp+wv+9,y:y+bh/2+1,dominantBaseline:'middle',fontSize:12,fontWeight:700,fill:dim?'#7a6e58':'#fff'},d.protesta+d.violencia));\n    });\n    return h('svg',{viewBox:'0 0 '+W+' '+H,width:'100%',style:{display:'block'}},kids);\n  }\n\n  META(){\n    return {\n      'Mina San Marcos':{desc:'Área de influencia directa de la operación minera. Gestiona el relacionamiento comunitario, el empleo local y el uso de suelo en torno al yacimiento.',distritos:4},\n      'Valle Fortaleza':{desc:'Corredor del mineroducto y vía de acceso. Supervisa el tránsito de concentrado, la gestión hídrica y los acuerdos con las comunidades del valle.',distritos:5},\n      'Huarmey':{desc:'Terminal portuario de embarque (Punta Lobitos). Coordina la actividad portuaria, la pesca artesanal y el relacionamiento con la población costera.',distritos:3},\n      'Huallanca':{desc:'Zona altoandina de infraestructura hídrica y energética. Monitorea embalses, suministro y comunidades campesinas de la cuenca alta.',distritos:6}\n    };\n  }\n\n  buildMap(active){\n    const h=React.createElement;\n    const W=660,H=600;\n    const OUT=\"M300 54 C268 62 250 92 240 130 C224 184 220 232 232 286 C242 340 268 392 296 446 C312 478 330 500 356 510 C404 496 452 462 498 420 C548 374 580 322 588 280 C594 244 578 200 548 172 C512 138 470 116 430 98 C392 82 344 60 300 54 Z\";\n    const Z={\n      'Mina San Marcos':{x:500,y:200,rx:45,ry:35,lab:'above'},\n      'Huallanca':{x:466,y:356,rx:41,ry:32,lab:'right'},\n      'Valle Fortaleza':{x:374,y:360,rx:43,ry:33,lab:'below'},\n      'Huarmey':{x:296,y:448,rx:40,ry:31,lab:'left'}\n    };\n    const meta=this.UGT().reduce((o,u)=>{o[u.name]={prob:u.prob,color:this.level(u.prob).color};return o;},{});\n    const kids=[];\n\n    kids.push(h('defs',{key:'defs'},[\n      h('clipPath',{key:'cp',id:'ancClip'},h('path',{d:OUT})),\n      h('linearGradient',{key:'lg',id:'landG',x1:0,y1:0,x2:1,y2:1},[\n        h('stop',{key:'a',offset:'0%',stopColor:'#1c3a52'}),\n        h('stop',{key:'b',offset:'55%',stopColor:'#173043'}),\n        h('stop',{key:'c',offset:'100%',stopColor:'#122537'})\n      ]),\n      h('linearGradient',{key:'og',id:'oceanG',x1:0,y1:0,x2:1,y2:0},[\n        h('stop',{key:'a',offset:'0%',stopColor:'rgba(43,124,192,.20)'}),\n        h('stop',{key:'b',offset:'100%',stopColor:'rgba(43,124,192,0)'})\n      ])\n    ]));\n\n    // ocean + coast label\n    kids.push(h('rect',{key:'ocean',x:0,y:0,width:230,height:H,fill:'url(#oceanG)'}));\n    for(let i=0;i<3;i++){ kids.push(h('path',{key:'w'+i,d:'M'+(54+i*20)+' 150 q 16 70 0 140 q -16 70 0 140',fill:'none',stroke:'rgba(111,180,232,'+(0.20-i*0.05)+')',strokeWidth:1.6,strokeLinecap:'round'})); }\n    kids.push(h('text',{key:'oce',x:60,y:300,fill:'#5a86b0',fontSize:11,fontWeight:600,letterSpacing:'.18em',transform:'rotate(-90 60 300)',textAnchor:'middle'},'OCÉANO PACÍFICO'));\n\n    // neighbor labels\n    const nb=[['LA LIBERTAD',322,34],['HUÁNUCO',626,250],['LIMA',430,556]];\n    nb.forEach((n,i)=>kids.push(h('text',{key:'nb'+i,x:n[1],y:n[2],fill:'#41566b',fontSize:10.5,fontWeight:600,letterSpacing:'.14em',textAnchor:'middle'},n[0])));\n\n    // landmass\n    kids.push(h('path',{key:'land',d:OUT,fill:'url(#landG)',stroke:'rgba(140,180,214,.5)',strokeWidth:2,strokeLinejoin:'round'}));\n\n    // graticule clipped to land\n    const grat=[];\n    [200,280,360,440,520].forEach((x,i)=>grat.push(h('line',{key:'gx'+i,x1:x,y1:0,x2:x,y2:H,stroke:'rgba(255,255,255,.05)',strokeWidth:1})));\n    [140,240,340,440].forEach((y,i)=>grat.push(h('line',{key:'gy'+i,x1:0,y1:y,x2:W,y2:y,stroke:'rgba(255,255,255,.05)',strokeWidth:1})));\n    kids.push(h('g',{key:'grat',clipPath:'url(#ancClip)'},grat));\n\n    // Cordillera Blanca hint\n    kids.push(h('path',{key:'cord',d:'M360 150 C372 220 392 300 392 372',fill:'none',stroke:'rgba(180,205,228,.16)',strokeWidth:6,strokeLinecap:'round',clipPath:'url(#ancClip)'}));\n\n    // corridor (mineroducto) MSM -> Huallanca -> Valle Fortaleza -> Huarmey\n    const order=['Mina San Marcos','Huallanca','Valle Fortaleza','Huarmey'];\n    const cpath='M'+order.map(n=>Z[n].x+' '+Z[n].y).join(' L');\n    kids.push(h('path',{key:'corr',d:cpath,fill:'none',stroke:'rgba(190,210,230,.45)',strokeWidth:2,strokeDasharray:'6 6',strokeLinecap:'round'}));\n    // corridor caption\n    kids.push(h('text',{key:'corrlab',x:430,y:300,fill:'#7f93a8',fontSize:9.5,fontWeight:600,letterSpacing:'.06em',textAnchor:'middle',transform:'rotate(58 430 300)'},'mineroducto / corredor'));\n\n    // influence zones\n    order.forEach((name,i)=>{\n      const z=Z[name], m=meta[name];\n      const isA=active===name, dim=active&&!isA;\n      const op=isA?0.92:(dim?0.3:0.7);\n      // glow\n      kids.push(h('ellipse',{key:'gl'+i,cx:z.x,cy:z.y,rx:z.rx+(isA?16:8),ry:z.ry+(isA?16:8),fill:m.color,opacity:isA?0.22:0.10,style:{transition:'all .25s ease'}}));\n      kids.push(h('ellipse',{key:'zo'+i,cx:z.x,cy:z.y,rx:z.rx,ry:z.ry,fill:m.color,opacity:op,\n        stroke:isA?'#ffffff':'rgba(255,255,255,.55)',strokeWidth:isA?2.6:1.4,\n        style:{cursor:'pointer',transition:'opacity .2s ease, stroke-width .2s ease',filter:isA?'drop-shadow(0 6px 16px '+m.color+'cc)':'none'},\n        onMouseEnter:()=>this.setState({hover:name}),\n        onClick:()=>this.setState({focus:this.state.focus===name?null:name})}));\n    });\n\n    // endpoint markers (mine origin / port destination)\n    const marker=(x,y,glyph,tag,tx)=>{\n      const g=[h('circle',{key:'c',cx:x,cy:y,r:9,fill:'#0c1c33',stroke:'#fff',strokeWidth:2}),\n        h('text',{key:'g',x:x,y:y+0.5,textAnchor:'middle',dominantBaseline:'central',fontSize:10,fontWeight:800,fill:'#fff'},glyph)];\n      g.push(h('text',{key:'t',x:x,y:y-15,textAnchor:tx,fontSize:9.5,fontWeight:700,fill:'#aebfd2',letterSpacing:'.04em',style:{paintOrder:'stroke',stroke:'rgba(8,18,33,.7)',strokeWidth:3}},tag));\n      return h('g',{key:'mk'+x,style:{pointerEvents:'none'}},g);\n    };\n    kids.push(marker(Z['Mina San Marcos'].x,Z['Mina San Marcos'].y,'M','MINA (origen)','middle'));\n    kids.push(marker(Z['Huarmey'].x,Z['Huarmey'].y,'P','PUERTO (destino)','middle'));\n\n    // zone labels\n    order.forEach((name,i)=>{\n      const z=Z[name], m=meta[name];\n      const dim=active&&active!==name;\n      let lx=z.x, ly=z.y, anchor='middle';\n      if(z.lab==='right'){lx=z.x+z.rx+8;anchor='start';}\n      else if(z.lab==='left'){lx=z.x-z.rx-8;anchor='end';}\n      else if(z.lab==='below'){ly=z.y+z.ry+18;}\n      else {ly=z.y-z.ry-20;} // above\n      const baseY = (z.lab==='left'||z.lab==='right') ? z.y-3 : ly;\n      kids.push(h('g',{key:'lab'+i,style:{pointerEvents:'none',opacity:dim?0.45:1,transition:'opacity .2s ease'}},[\n        h('text',{key:'n',x:lx,y:baseY,textAnchor:anchor,fontSize:11.5,fontWeight:700,fill:'#fff',style:{paintOrder:'stroke',stroke:'rgba(8,18,33,.75)',strokeWidth:3.2,strokeLinejoin:'round'}},name),\n        h('text',{key:'p',x:lx,y:baseY+17,textAnchor:anchor,fontSize:15,fontWeight:800,fill:'#fff',style:{paintOrder:'stroke',stroke:'rgba(8,18,33,.75)',strokeWidth:3.2,strokeLinejoin:'round'}},m.prob.toFixed(1)+'%')\n      ]));\n    });\n\n    // capital pin (Huaraz) for orientation\n    kids.push(h('g',{key:'cap',style:{pointerEvents:'none'}},[\n      h('circle',{key:'o',cx:372,cy:372,r:3.4,fill:'none',stroke:'#dfe8f2',strokeWidth:1.6}),\n      h('circle',{key:'i',cx:372,cy:372,r:1.2,fill:'#dfe8f2'}),\n      h('text',{key:'t',x:378,y:375,fontSize:9,fill:'#9fb0c2',fontWeight:600},'Huaraz')\n    ]));\n\n    // north arrow\n    kids.push(h('g',{key:'north',style:{pointerEvents:'none'}},[\n      h('path',{key:'a',d:'M620 40 L614 58 L620 53 L626 58 Z',fill:'#aebfd2'}),\n      h('text',{key:'n',x:620,y:74,textAnchor:'middle',fontSize:10,fontWeight:700,fill:'#aebfd2'},'N')\n    ]));\n\n    // scale bar\n    kids.push(h('g',{key:'scale',style:{pointerEvents:'none'}},[\n      h('line',{key:'l',x1:40,y1:566,x2:128,y2:566,stroke:'#7f93a8',strokeWidth:2}),\n      h('line',{key:'t1',x1:40,y1:562,x2:40,y2:570,stroke:'#7f93a8',strokeWidth:2}),\n      h('line',{key:'t2',x1:128,y1:562,x2:128,y2:570,stroke:'#7f93a8',strokeWidth:2}),\n      h('text',{key:'t',x:84,y:558,textAnchor:'middle',fontSize:9.5,fill:'#7f93a8'},'~80 km')\n    ]));\n\n    return h('svg',{viewBox:'0 0 '+W+' '+H,width:'100%',style:{display:'block',maxHeight:'460px',margin:'0 auto'}},kids);\n  }\n\n  renderVals(){\n    const focus=this.state.focus, hover=this.state.hover;\n    const active=hover||focus;\n\n    const chip=(c)=>({display:'inline-flex',alignItems:'center',justifyContent:'center',minWidth:'34px',padding:'3px 9px',borderRadius:'7px',fontSize:'12px',fontWeight:700,color:c==='#6b7d90'?'#9fb0c2':c,background:c+'22',border:'1px solid '+c+'55'});\n    const badge=(c)=>({display:'inline-flex',alignItems:'center',padding:'3px 11px',borderRadius:'999px',fontSize:'11px',fontWeight:800,letterSpacing:'.04em',color:c,background:c+'22',border:'1px solid '+c+'66'});\n\n    let panel={panelDetail:false,panelOverview:true,panelColor:'#2b7cc0'};\n    if(active){\n      const u=this.UGT().find(x=>x.name===active);\n      const mt=this.level(u.prob), meta=this.META()[active];\n      const ac=u.prob>=55?{label:'Atención prioritaria',color:'#ef4d5e'}:(u.prob>=35?{label:'Monitoreo reforzado',color:'#f5a623'}:{label:'Vigilancia rutinaria',color:'#2ec58f'});\n      panel={panelDetail:true,panelOverview:false,panelColor:mt.color,\n        panelName:active,panelLevel:mt.level,panelProb:u.prob.toFixed(1),panelDesc:meta.desc,\n        panelBadgeStyle:badge(mt.color),\n        panelBigStyle:{fontSize:'34px',fontWeight:800,lineHeight:1,color:mt.color},\n        panelKpis:[\n          {label:'Nivel de riesgo',val:mt.level},\n          {label:'Eventos históricos',val:String(u.protesta+u.violencia)},\n          {label:'Frecuencia histórica',val:u.freq+'%'},\n          {label:'Distritos cubiertos',val:String(meta.distritos)}\n        ],\n        panelActionLabel:ac.label,\n        panelActionStyle:{display:'inline-flex',alignItems:'center',padding:'4px 12px',borderRadius:'999px',fontSize:'12px',fontWeight:700,color:ac.color,background:ac.color+'20',border:'1px solid '+ac.color+'55'}};\n    }\n\n    let rows=this.ROWS().map(a=>({ugt:a[0],provincia:a[1],distrito:a[2],eventos:a[3],fecha:a[4],indice:a[5]}));\n    if(focus) rows=rows.filter(r=>r.ugt===focus);\n    rows=rows.map(r=>{\n      const im=this.idxMeta(r.indice), ac=this.action(r.indice);\n      const hasNews=r.eventos>0;\n      const newsUrl=hasNews?('https://news.google.com/search?q='+encodeURIComponent('\"'+r.distrito+'\" Áncash protesta conflicto social Antamina')+'&hl=es-419&gl=PE&ceid=PE:es-419'):'';\n      return {...r, idxStyle:chip(im.color),\n        rowStyle:{display:'grid',gridTemplateColumns:'1fr .8fr 1fr 56px 84px 64px 1.3fr 60px',gap:'0',alignItems:'center',fontSize:'12.5px',padding:'8px 7px',borderBottom:'1px solid rgba(255,255,255,.05)'},\n        dotStyle:{width:'8px',height:'8px',borderRadius:'50%',background:ac.color,flex:'none'},\n        action:ac.label, hasNews, noNews:!hasNews, newsUrl};\n    });\n\n    const focusChip = focus\n      ? {color:'#7fc4f0',label:focus}\n      : {color:'#8497ab',label:'Todas las UGTs'};\n\n    return {\n      mapSvg:this.buildMap(active),\n      onMapLeave:()=>this.setState({hover:null}),\n      ...panel,\n      modelChart:this.buildModelChart(),\n      freqChart:this.buildFreqChart(),\n      eventChart:this.buildEventChart(),\n      rows, rowCount:rows.length,\n      isFocused:!!focus, focusLabel:focusChip.label,\n      focusChipStyle:{display:'inline-flex',alignItems:'center',padding:'3px 12px',borderRadius:'999px',fontSize:'12px',fontWeight:700,color:focusChip.color,background:focusChip.color+'1f',border:'1px solid '+focusChip.color+'55'},\n      onClearFocus:()=>this.setState({focus:null})\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
